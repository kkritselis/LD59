<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eroded Terrain</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas { display: block; }

        /* Loading screen */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e14;
            color: rgba(255,255,255,0.6);
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            transition: opacity 0.6s ease;
            z-index: 10;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading">GENERATING TERRAIN&nbsp;...</div>


    <!-- Import map: resolves 'three' for ES modules without a bundler -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
    </script>

    <!-- Main app (ES module) -->
    <script type="module" src="./js/main.js"></script>

    <script>
        // Hide loading screen once first frame paints
        window.addEventListener('load', () => {
            // Give shaders a moment to compile
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 800);
        });
    </script>
</body>
</html>
